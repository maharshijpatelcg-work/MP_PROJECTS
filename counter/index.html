<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Counter</title>
    <link id="dynamic-favicon" rel="icon" type="image/png" href="data:,">
    <!-- Use Inter font which matches the clean aesthetic of the image perfectly -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Overlays -->
    <div id="info-overlay" class="overlay">
        <div class="overlay-content text-center">
            <h2>Simple Counter</h2>
            <p>A simple tool for counting things and<br>keeping track of numbers.</p>
            <p style="font-size: 0.8rem; color: #444; margin-top: 40px;">Tap anywhere to continue</p>
        </div>
    </div>

    <div id="settings-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h2>Settings</h2>
            <div class="settings-group">
                <label>
                    <input type="checkbox" id="prevent-negative-toggle">
                    <span class="custom-checkbox"></span>
                    Prevent Negative Numbers
                </label>
            </div>
            <div class="settings-group mt-15">
                <label for="max-limit-input">Set Max Limit</label>
                <input type="number" id="max-limit-input" placeholder="No Limit">
            </div>
            <button class="close-overlay-btn mt-20" id="close-settings-btn">Done</button>
        </div>
    </div>

    <!-- Top Navigation Icons -->
    <div class="top-nav">
        <!-- Using SVG for precise iconography matching the screenshot -->
        <button id="info-btn" class="nav-btn" aria-label="Info">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
        </button>
        <button id="settings-btn" class="nav-btn" aria-label="Settings">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </button>
        <button id="reset-btn" class="nav-btn" aria-label="Reset">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
        </button>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
        <button id="decrement-btn" class="circle-btn" aria-label="Decrease">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19 13H5v-2h14v2z"/></svg>
        </button>
        
        <div class="counter-display">
            <span id="counter-value">0</span>
        </div>
        
        <button id="increment-btn" class="circle-btn" aria-label="Increase">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
    </div>

    <!-- Bottom Indicator Area -->
    <div class="bottom-indicator">
        <div id="limit-display" class="hidden">0</div>
        <div id="limit-warning" class="hidden">LIMIT REACHED</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
